# GitLab CI/CD Pipeline for Crawdad (Family Planning)
# Progressive testing: unit → component → security → scalability → local deploy

stages:
  - install
  - lint
  - unit-test
  - component-test
  - security-test
  - scalability-test
  - local-deploy
  - notify

# ─── Variables ─────────────────────────────────────────────────────────────────
variables:
  NODE_VERSION: "22"
  DOCKER_IMAGE: node:${NODE_VERSION}-alpine
  PORT: 8080

# ─── Cache Setup ───────────────────────────────────────────────────────────────
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - .npm/

# ─── Install Stage ─────────────────────────────────────────────────────────────
install:
  stage: install
  image: ${DOCKER_IMAGE}
  script:
    - npm ci --omit=dev
    - npm install mocha chai chai-http supertest eslint nyc --save-dev
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour
  coverage: '/Coverage: \d+\.\d+%/'
  allow_failure: false

# ─── Lint Stage ────────────────────────────────────────────────────────────────
lint:
  stage: lint
  image: ${DOCKER_IMAGE}
  needs: [install]
  script:
    - npm run lint
  allow_failure: false

# ─── Unit Tests ────────────────────────────────────────────────────────────────
unit-test:
  stage: unit-test
  image: ${DOCKER_IMAGE}
  needs: [install]
  script:
    - npx mocha test/unit/*.test.js --reporter spec --timeout 10000
  coverage: '/Statements\s+:\s+(\d+\.\d+)%/'
  allow_failure: false

# ─── Component Tests ───────────────────────────────────────────────────────────
component-test:
  stage: component-test
  image: ${DOCKER_IMAGE}
  needs: [install]
  script:
    - npx mocha test/component/*.test.js --reporter spec --timeout 15000
  allow_failure: false

# ─── Security Tests ────────────────────────────────────────────────────────────
security-test:
  stage: security-test
  image: ${DOCKER_IMAGE}
  needs: [install]
  script:
    - npx mocha test/security/*.test.js --reporter spec --timeout 15000
    # Dependency vulnerability check via npm audit
    - npm audit --audit-level=high || true
  allow_failure: false

# ─── Scalability Tests ─────────────────────────────────────────────────────────
scalability-test:
  stage: scalability-test
  image: ${DOCKER_IMAGE}
  needs: [install]
  script:
    - npx mocha test/scalability/*.test.js --reporter spec --timeout 30000
  allow_failure: false

# ─── Local Docker Deploy ────────────────────────────────────────────────────────
local-deploy:
  stage: local-deploy
  image: docker:24-dind
  needs: [unit-test, component-test, security-test, scalability-test]
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    # Build the Docker image
    - docker build -t crawdad:$CI_COMMIT_SHA .
    # Run container in background
    - docker run -d --name crawdad-test-$CI_COMMIT_SHA -p 8080:8080 crawdad:$CI_COMMIT_SHA
    # Wait for container to start
    - sleep 5
    # Health check
    - docker inspect crawdad-test-$CI_COMMIT_SHA --format='{{.State.Running}}'
    # Verify endpoint responds
    - curl -f http://localhost:8080/ || exit 1
    - curl -f http://localhost:8080/api/plan/week || exit 1
    - curl -f http://localhost:8080/calendar || exit 1
    - curl -f http://localhost:8080/shopping || exit 1
    - curl -f http://localhost:8080/recipes || exit 1
    - curl -f http://localhost:8080/weather || exit 1
    # Run smoke test against live container
    - docker exec crawdad-test-$CI_COMMIT_SHA node -e "console.log('Node OK')"
    # Cleanup
    - docker stop crawdad-test-$CI_COMMIT_SHA
    - docker rm crawdad-test-$CI_COMMIT_SHA
  allow_failure: false

# ─── Notify Stage ──────────────────────────────────────────────────────────────
notify:
  stage: notify
  needs: [local-deploy]
  only:
    - main
    - master
    - develop
  script:
    - echo "✅ Pipeline completed successfully for commit $CI_COMMIT_SHA"
    - echo "🌐 All tests passed. Application deployed and verified."
  allow_failure: false
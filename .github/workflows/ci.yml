name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Stage 1: Install + Lint ────────────────────────────────────────────────
  install-and-lint:
    name: Install & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dev dependencies
        run: npm install --save-dev mocha chai chai-http supertest eslint nyc

      - name: Run ESLint
        run: npm run lint

  # ─── Stage 2: Unit Tests ────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dev dependencies
        run: npm install --save-dev mocha chai chai-http supertest eslint nyc

      - name: Run unit tests
        run: npx mocha test/unit/*.test.js --reporter spec --timeout 10000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          retention-days: 7

  # ─── Stage 3: Component Tests ────────────────────────────────────────────────
  component-test:
    name: Component Tests
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dev dependencies
        run: npm install --save-dev mocha chai chai-http supertest eslint nyc

      - name: Run component tests
        run: npx mocha test/component/*.test.js --reporter spec --timeout 15000

  # ─── Stage 4: Security Tests ────────────────────────────────────────────────
  security-test:
    name: Security Tests
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dev dependencies
        run: npm install --save-dev mocha chai chai-http supertest eslint nyc

      - name: Run security tests
        run: npx mocha test/security/*.test.js --reporter spec --timeout 15000

      - name: Run npm audit
        run: npm audit --audit-level=high || true

  # ─── Stage 5: Scalability Tests ────────────────────────────────────────────
  scalability-test:
    name: Scalability Tests
    runs-on: ubuntu-latest
    needs: install-and-lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dev dependencies
        run: npm install --save-dev mocha chai chai-http supertest eslint nyc

      - name: Run scalability tests
        run: npx mocha test/scalability/*.test.js --reporter spec --timeout 30000

  # ─── Stage 6: Local Docker Deploy ───────────────────────────────────────────
  local-deploy:
    name: Docker Deploy & Smoke Test
    runs-on: ubuntu-latest
    needs: [unit-test, component-test, security-test, scalability-test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t crawdad:${{ github.sha }} .

      - name: Run container
        run: |
          docker run -d --name crawdad-test-${{ github.sha }} \
            -p 8080:8080 \
            -e NODE_ENV=production \
            -e PORT=8080 \
            crawdad:${{ github.sha }}

      - name: Wait for container startup
        run: sleep 8

      - name: Health check
        run: |
          CONTAINER_RUNNING=$(docker inspect crawdad-test-${{ github.sha }} --format='{{.State.Running}}')
          echo "Container running: $CONTAINER_RUNNING"
          if [ "$CONTAINER_RUNNING" != "true" ]; then
            echo "Container not running. Showing logs:"
            docker logs crawdad-test-${{ github.sha }} 2>&1 || true
            docker inspect crawdad-test-${{ github.sha }} --format='{{.State}}' || true
            exit 1
          fi

      - name: Smoke test - Home page
        run: curl -sf http://localhost:8080/ || exit 1

      - name: Smoke test - Calendar
        run: curl -sf http://localhost:8080/calendar || exit 1

      - name: Smoke test - Shopping
        run: curl -sf http://localhost:8080/shopping || exit 1

      - name: Smoke test - Recipes
        run: curl -sf http://localhost:8080/recipes || exit 1

      - name: Smoke test - Weather
        run: curl -sf http://localhost:8080/weather || exit 1

      - name: Smoke test - API plan/week
        run: curl -sf http://localhost:8080/api/plan/week || exit 1

      - name: Smoke test - API weather
        run: curl -sf http://localhost:8080/api/weather || exit 1

      - name: Cleanup container
        if: always()
        run: |
          docker stop crawdad-test-${{ github.sha }}
          docker rm crawdad-test-${{ github.sha }}

  # ─── Stage 7: Notify ────────────────────────────────────────────────────────
  notify:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: local-deploy
    if: success()
    steps:
      - name: Success notification
        run: |
          echo "✅ Pipeline completed successfully"
          echo "🌐 Commit: ${{ github.sha }}"
          echo "📅 Triggered by: ${{ github.event_name }}"
          echo "🔗 Repo: ${{ github.repository }}"
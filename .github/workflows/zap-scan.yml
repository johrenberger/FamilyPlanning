name: Weekly ZAP Security Scan

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  zap-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        run: |
          chmod -R 777 "$GITHUB_WORKSPACE"
          docker pull ghcr.io/zaproxy/zaproxy:stable -q
          docker run \
            --rm \
            -v "$GITHUB_WORKSPACE:/zap/wrk:rw" \
            --network="host" \
            --user "zap:zap" \
            -e HOME=/zap/wrk \
            -e ZAP_AUTH_HEADER \
            -e ZAP_AUTH_HEADER_VALUE \
            -e ZAP_AUTH_HEADER_SITE \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t https://meal.clawdexter.tech \
              -J /zap/wrk/zap_report.json \
              -w /zap/wrk/zap_report.md \
              -r /zap/wrk/zap_report.html

      - name: Write analysis script
        run: |
          cat > /tmp/analyze_zap.py << 'SCRIPT'
          import json, sys
          try:
              with open('zap_report.json') as f:
                  data = json.load(f)
              sites = data.get('site', [])
              print('Sites scanned:', len(sites))
              total = 0
              for site in sites:
                  name = site.get('name', 'unknown')
                  alerts = site.get('alerts', [])
                  total += len(alerts)
                  print('Site: ' + name + ' - ' + str(len(alerts)) + ' alerts')
                  for a in alerts[:5]:
                      print('  [' + a.get('risk', '?') + '] ' + a.get('name', ''))
                  if len(alerts) > 5:
                      print('  ... and ' + str(len(alerts)-5) + ' more')
              print('Total alerts: ' + str(total))
          except Exception as e:
              print('Error: ' + str(e))
              sys.exit(1)
          SCRIPT

      - name: Analyze ZAP report
        run: python3 /tmp/analyze_zap.py
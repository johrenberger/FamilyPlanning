name: Weekly ZAP Security Scan

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  zap-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        run: |
          # Get runner's UID/GID
          RUNNER_UID=$(id -u)
          RUNNER_GID=$(id -g)
          
          # Pull image and run as runner's UID so bind-mounted workspace is writable
          docker pull ghcr.io/zaproxy/zaproxy:stable -q
          docker run \
            -v "$GITHUB_WORKSPACE:/zap/wrk/:rw" \
            --network="host" \
            --user "$RUNNER_UID:$RUNNER_GID" \
            -e ZAP_AUTH_HEADER \
            -e ZAP_AUTH_HEADER_VALUE \
            -e ZAP_AUTH_HEADER_SITE \
            -e HOME=/tmp/zap-home \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t https://meal.clawdexter.tech \
              -J "$GITHUB_WORKSPACE/zap_report.json" \
              -w "$GITHUB_WORKSPACE/zap_report.md" \
              -r "$GITHUB_WORKSPACE/zap_report.html"

      - name: Display ZAP report summary
        run: |
          echo "=== ZAP Report Summary ==="
          if [ -f zap_report.json ]; then
            python3 << 'PYEOF'
import json
with open('zap_report.json') as f:
    data = json.load(f)
sites = data.get('site', [])
print(f"Sites scanned: {len(sites)}")
total = 0
for site in sites:
    name = site.get('name', 'unknown')
    alerts = site.get('alerts', [])
    total += len(alerts)
    print(f"Site: {name} - {len(alerts)} alerts")
    for a in alerts[:5]:
        print(f"  [{a.get('risk','?')}] {a.get('name','')}")
    if len(alerts) > 5:
        print(f"  ... and {len(alerts)-5} more")
print(f"Total alerts: {total}")
PYEOF
          else
            echo "No zap_report.json found"
          fi
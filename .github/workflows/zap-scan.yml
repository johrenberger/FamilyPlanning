name: Weekly ZAP Security Scan

on:
  schedule:
    # Run every Sunday at 20:00 UTC
    - cron: '0 20 * * 0'
  workflow_dispatch:
    # Allow manual trigger any time

permissions:
  issues: write
  contents: read

jobs:
  zap-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://meal.clawdexter.tech'
          allow_issue_writing: false
          cmd_options: '-r -j -u root'
          artifact_name: 'zap-scan-report'
        id: zap

      - name: Download ZAP report artifact
        uses: actions/download-artifact@v4
        with:
          name: zap-scan-report
          path: ./zap-reports

      - name: List report files
        run: |
          echo "=== Report files ==="
          ls -la zap-reports/ 2>/dev/null || echo "No reports found"
          echo ""
          echo "=== JSON summary ==="
          if [ -f zap-reports/zap_report.json ]; then
            python3 -c "
import json
with open('zap-reports/zap_report.json') as f:
    data = json.load(f)
sites = data.get('site', [])
total_alerts = sum(len(s.get('alerts', [])) for s in sites)
print(f'Sites scanned: {len(sites)}')
print(f'Total alerts: {total_alerts}')
for s in sites:
    for a in s.get('alerts', []):
        print(f\"  [{a['risk']}] {a['name']} — {a['desc'][:80]}\")
" 2>/dev/null || echo "JSON parse failed"
          else
            echo "zap_report.json not found"
          fi
name: Weekly ZAP Security Scan

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  zap-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://meal.clawdexter.tech'
          allow_issue_writing: false
          cmd_options: '-r -j'
          artifact_name: 'zap_scan_report'
        env:
          HOME: '/tmp/zap-home'

      - name: Download ZAP report artifact
        uses: actions/download-artifact@v4
        with:
          name: zap_scan_report
          path: ./zap-reports

      - name: Write analysis script
        run: |
          cat > /tmp/analyze_zap.py << 'SCRIPT'
          import json, sys
          try:
              with open('zap-reports/zap_report.json') as f:
                  data = json.load(f)
              sites = data.get('site', [])
              print('Sites scanned:', len(sites))
              total = 0
              for site in sites:
                  name = site.get('name', 'unknown')
                  alerts = site.get('alerts', [])
                  total += len(alerts)
                  print(f"Site: {name} - {len(alerts)} alerts")
                  for a in alerts[:5]:
                      risk = a.get('risk', '?')
                      print(f"  [{risk}] {a.get('name', '')}")
                  if len(alerts) > 5:
                      print(f"  ... and {len(alerts)-5} more")
              print(f"Total alerts: {total}")
          except Exception as e:
              print("Error:", e)
              sys.exit(1)
          SCRIPT

      - name: Analyze ZAP report
        run: python3 /tmp/analyze_zap.py
name: Weekly ZAP Security Scan

on:
  schedule:
    # Run every Sunday at 20:00 UTC
    - cron: '0 20 * * 0'
  workflow_dispatch:
    # Allow manual trigger any time

permissions:
  issues: write  # needed for ZAP issue writing feature
  contents: read

jobs:
  zap-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://meal.clawdexter.tech'
          allow_issue_writing: false
          artifact_name: 'zap-report'
          cmd_options: '-r -j'  # -r = HTML report, -j = JSON report (saved to zap_report.json)

      - name: Upload ZAP JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-json
          path: zap_report.json
          retention-days: 30
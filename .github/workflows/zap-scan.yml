name: Weekly ZAP Security Scan

on:
  schedule:
    # Run every Sunday at 20:00 UTC
    - cron: '0 20 * * 0'
  workflow_dispatch:
    # Allow manual trigger any time

permissions:
  issues: write
  contents: read

jobs:
  zap-scan:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://meal.clawdexter.tech'
          allow_issue_writing: false
          cmd_options: '-r -j -l OFF'
          artifact_name: 'zap-scan-report'
        id: zap

      - name: Download and display ZAP report
        uses: actions/download-artifact@v4
        with:
          name: zap-scan-report
          path: ./zap-reports

      - name: Analyze ZAP report
        run: |
          echo "=== ZAP Report Summary ==="
          if [ -f zap-reports/zap_report.json ]; then
            python3 << 'PYEOF'
import json, sys

with open('zap-reports/zap_report.json') as f:
    data = json.load(f)

sites = data.get('site', [])
print(f"Sites scanned: {len(sites)}\n")

for site in sites:
    alerts = site.get('alerts', [])
    if not alerts:
        print(f"Site: {site.get('name', 'unknown')} — 0 alerts ✅")
        continue

    risk_counts = {'High': 0, 'Medium': 0, 'Low': 0, 'Informational': 0}
    for a in alerts:
        risk = a.get('risk', 'Unknown')
        risk_counts[risk] = risk_counts.get(risk, 0) + 1

    print(f"Site: {site.get('name')} — {len(alerts)} alerts:")
    for risk, count in sorted(risk_counts.items(), key=lambda x: ['High','Medium','Low','Informational'].index(x[0])):
        if count:
            print(f"  {risk}: {count}")

    print("\n  Top findings:")
    for a in sorted(alerts, key=lambda x: ['High','Medium','Low','Informational'].index(x.get('risk','Low')))[:5]:
        print(f"  [{a['risk']}] {a['name']}")
        print(f"    URL: {a.get('url', 'N/A')}")
        desc = a.get('desc', '')[:200].replace('\n', ' ')
        print(f"    {desc}...")
        print()
PYEOF
          else
            echo "No zap_report.json found in artifact"
            echo "Available files:"
            ls -la zap-reports/ 2>/dev/null || echo "Directory empty or not found"
          fi